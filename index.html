<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dogsvr Example</title>
    <style>
        /* Inlined first-paint CSS to avoid a stylesheet round-trip. */
        :root {
            --bg-top: #F5F7FA;
            --bg-bot: #E4ECF7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-stroke: #D5DBDB;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --accent: #5DADE2;
            --accent-down: #3498DB;
            --danger: #E57373;
            --radius-card: 20px;
            --radius-btn: 12px;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
            background-attachment: fixed;
            /* No overflow:hidden on body: iOS Safari shrinks visualViewport on
               soft-keyboard open, which would pin the login card off-screen. */
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* iOS Safari address-bar-aware height; 100vh keeps older browsers sane. */
            min-height: 100dvh;
            /* viewport-fit=cover authorizes painting into the notch; env(safe-area-inset-*) fills it. */
            padding:
                max(16px, env(safe-area-inset-top))
                max(16px, env(safe-area-inset-right))
                max(16px, env(safe-area-inset-bottom))
                max(16px, env(safe-area-inset-left));
            box-sizing: border-box;
        }

        /* ---------- Login card ---------- */

        .card {
            /* Must sit above #game (position:fixed) or the empty #game div eats pointer events. */
            position: relative;
            z-index: 20;
            width: min(380px, calc(100% - 32px));
            padding: 28px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-stroke);
            border-radius: var(--radius-card);
            box-shadow: 0 10px 30px rgba(44, 62, 80, 0.12);
            box-sizing: border-box;
        }

        .card h1 {
            margin: 0 0 16px 0;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
        }

        .card ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .card li {
            margin: 12px 0;
        }

        .card label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .card input,
        .card select {
            width: 100%;
            min-height: 44px;
            padding: 0 12px;
            font-size: 16px; /* 16px prevents iOS Safari auto-zoom on focus. */
            border: 1px solid var(--card-stroke);
            border-radius: var(--radius-btn);
            background: #fff;
            box-sizing: border-box;
            outline: none;
            transition: border-color 120ms ease;
        }

        .card input:focus,
        .card select:focus {
            border-color: var(--accent);
        }

        .card small {
            display: block;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .card button {
            width: 100%;
            min-height: 48px;
            margin-top: 4px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-btn);
            cursor: pointer;
            transition: background 120ms ease, transform 80ms ease;
        }

        .card button:hover:not(:disabled) {
            background: var(--accent-down);
        }

        .card button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .card button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .card .error {
            margin-top: 10px;
            min-height: 18px;
            font-size: 13px;
            color: var(--danger);
            text-align: center;
        }

        /* ---------- Loading overlay ---------- */

        #app-loading {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            /* Same gradient as the body so Phaser's first frame matches during fade. */
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
            opacity: 1;
            transition: opacity 220ms ease;
        }

        #app-loading.is-fading {
            opacity: 0;
            pointer-events: none;
        }

        #app-loading .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(93, 173, 226, 0.25);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #app-loading #app-loading-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        #app-loading #app-loading-detail {
            font-size: 13px;
            color: var(--text-secondary);
            min-height: 18px;
            text-align: center;
            max-width: min(320px, calc(100% - 32px));
            /* Slow pulse signals "still working" even when text doesn't change. */
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.55; }
            50%      { opacity: 1; }
        }

        /* ---------- Phaser canvas mount ---------- */

        #game {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Clip canvas here rather than on body, which must still scroll for the login form. */
            overflow: hidden;
            /* Before Phaser mounts, #game is empty; don't let it absorb clicks. */
            pointer-events: none;
        }

        #game canvas {
            display: block;
            pointer-events: auto;
        }

        /* ---------- Narrow-phone tweaks ---------- */

        @media (max-width: 360px) {
            .card {
                padding: 20px 16px;
            }

            .card small {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Loading overlay: first paint, then again during the game-bundle download. -->
    <div id="app-loading">
        <div class="spinner"></div>
        <div id="app-loading-title">Connecting…</div>
        <div id="app-loading-detail">Fetching zone list</div>
    </div>

    <!-- Login card: hidden initially, revealed after bootstrap fetches zones. -->
    <div id="login-card" class="card" style="display: none;">
        <h1>dogsvr Example</h1>
        <form id="login">
            <ul>
                <li>
                    <label for="name">Name</label>
                    <input type="text" id="name" autocomplete="nickname"
                        maxlength="12" placeholder="Up to 6 characters" />
                </li>
                <li>
                    <label for="zoneid">Zone</label>
                    <select id="zoneid"></select>
                </li>
                <li>
                    <button type="submit">Login</button>
                </li>
            </ul>
            <div id="login-error" class="error" role="alert" aria-live="polite"></div>
        </form>
    </div>

    <!-- Phaser canvas mount; Phaser.Game constructor takes parent: 'game'. -->
    <div id="game"></div>

    <!-- Entry: dynamic-imports bootstrap, which lazy-loads Phaser. -->
    <script src="src/index.ts" type="module"></script>
</body>

</html>
