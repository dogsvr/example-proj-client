<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dogsvr Example</title>
    <style>
        /*
         * First-paint CSS is inlined here deliberately. An external stylesheet
         * would cost an extra HTTP round-trip before the login card becomes
         * interactive, and the CSS is small enough (~2 KB) that inlining
         * beats the cache win on repeat visits.
         */
        :root {
            --bg-top: #F5F7FA;
            --bg-bot: #E4ECF7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-stroke: #D5DBDB;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --accent: #5DADE2;
            --accent-down: #3498DB;
            --danger: #E57373;
            --radius-card: 20px;
            --radius-btn: 12px;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ---------- Login card (shown first-paint) ---------- */

        .card {
            /* Login card must sit above #game (which is position:fixed covering
               the viewport), otherwise the empty #game div intercepts all
               pointer events and the form becomes untouchable. */
            position: relative;
            z-index: 20;
            width: min(380px, calc(100% - 32px));
            padding: 28px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-stroke);
            border-radius: var(--radius-card);
            box-shadow: 0 10px 30px rgba(44, 62, 80, 0.12);
            box-sizing: border-box;
        }

        .card h1 {
            margin: 0 0 16px 0;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
        }

        .card ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .card li {
            margin: 12px 0;
        }

        .card label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .card input,
        .card select {
            width: 100%;
            min-height: 44px;
            padding: 0 12px;
            font-size: 16px;
            /* 16px prevents iOS Safari from auto-zooming on focus. */
            border: 1px solid var(--card-stroke);
            border-radius: var(--radius-btn);
            background: #fff;
            box-sizing: border-box;
            outline: none;
            transition: border-color 120ms ease;
        }

        .card input:focus,
        .card select:focus {
            border-color: var(--accent);
        }

        .card small {
            display: block;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .card button {
            width: 100%;
            min-height: 48px;
            margin-top: 4px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-btn);
            cursor: pointer;
            transition: background 120ms ease, transform 80ms ease;
        }

        .card button:hover:not(:disabled) {
            background: var(--accent-down);
        }

        .card button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .card button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .card .error {
            margin-top: 10px;
            min-height: 18px;
            font-size: 13px;
            color: var(--danger);
            text-align: center;
        }

        /* ---------- Initial loading spinner (shown before bootstrap resolves) ---------- */

        #app-loading {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        #app-loading .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(93, 173, 226, 0.25);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ---------- Phaser canvas mount ---------- */

        #game {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Until Phaser mounts a canvas, this container has no visual
               content and must not absorb clicks meant for the login card. */
            pointer-events: none;
        }

        #game canvas {
            display: block;
            pointer-events: auto;
        }

        /* ---------- Narrow-phone tweaks ---------- */

        @media (max-width: 360px) {
            .card {
                padding: 20px 16px;
            }

            .card small {
                display: none;
                /* Keep the card compact on very narrow screens. */
            }
        }
    </style>
</head>

<body>
    <!-- Shown on first paint; hidden by bootstrap.ts once zone list arrives. -->
    <div id="app-loading">
        <div class="spinner"></div>
        <div>Connecting…</div>
    </div>

    <!-- Login card: hidden initially, revealed after bootstrap.ts fetches zone list. -->
    <div id="login-card" class="card" style="display: none;">
        <h1>dogsvr Example</h1>
        <form id="login">
            <ul>
                <li>
                    <label for="openid">OpenId</label>
                    <input type="text" id="openid" autocomplete="username"
                        placeholder="A unique string identifying you" />
                </li>
                <li>
                    <label for="zoneid">Zone</label>
                    <select id="zoneid"></select>
                    <small>To add a new zone, run in mongo shell:
                        <code>use dogsvr-example-proj; db.zone_coll.insertOne({zoneId:100001})</code>
                    </small>
                </li>
                <li>
                    <button type="submit">Login</button>
                </li>
            </ul>
            <div id="login-error" class="error" role="alert" aria-live="polite"></div>
        </form>
    </div>

    <!-- Phaser canvas mount point; Phaser.Game constructor takes parent: 'game'. -->
    <div id="game"></div>

    <!-- Entry script: dynamically imports bootstrap, which lazy-loads Phaser. -->
    <script src="src/index.ts" type="module"></script>
</body>

</html>
